syntax = "proto3";

package dra;

service DRAService {
  rpc PullAndRunImage(PullAndRunRequest) returns (PullAndRunResponse);
  rpc StopContainer(StopContainerRequest) returns (StopContainerResponse);
}

enum WorkloadState {
  WORKLOAD_STATE_UNSPECIFIED = 0;
  STOPPED = 1;
  RUNNING = 2;
  DONE = 3;
  ERROR = 4;
}

message PullAndRunRequest {
  string image_name = 1;
  // Optional args after the image (container CMD). Use when the image default exits, e.g. "sleep", "infinity".
  repeated string command = 2;
  // Docker --restart value: no | on-failure | always | unless-stopped (or on-failure:N). Empty uses DRA_DOCKER_RESTART_POLICY env if set.
  // "unless-stopped" is typical for long-running services: survives crashes/reboots until docker stop/rm.
  string restart_policy = 3;
  // Scheduler reservation: minimum memory (GB) to reserve for this deployment on the chosen machine.
  // The server uses this to decrement machines.available_gb and to persist job metadata.
  float memory_gb = 4;
}

message PullAndRunResponse {
  bool success = 1;
  string container_id = 2;
  WorkloadState workload_state = 3;
  float cpu_used = 4;
  float memory_gb_used = 5;
  string message = 6;
}

message StopContainerRequest {
  string container_id = 1;
}

message StopContainerResponse {
  bool success = 1;
  string message = 2;
  // Memory released back to the machine (GB), when known.
  float memory_gb_released = 3;
}

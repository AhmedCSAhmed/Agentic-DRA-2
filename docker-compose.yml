# DRA + Agent using an external Postgres (Supabase).
# Start server:  docker compose up -d dra
# Run agent:     docker compose run --rm agent nginx:latest
# Stop:          docker compose down
#
# Required env:
# - DATABASE_URL: Supabase *direct* Postgres URL (SQLAlchemy/psycopg)
# Optional env:
# - OPENAI_API_KEY
# - DRA_GRPC_BIND, DRA_GRPC_MAX_WORKERS, DRA_GRPC_TARGET
#
# Local DB (optional): enable the `local-db` profile and set DATABASE_URL accordingly.

services:
  dra:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app:rw
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to your Supabase direct Postgres URL}
      DRA_GRPC_BIND: ${DRA_GRPC_BIND:-0.0.0.0:50051}
      DRA_GRPC_MAX_WORKERS: ${DRA_GRPC_MAX_WORKERS:-10}
    ports:
      - "50051:50051"
    command: >
      sh -lc "pip install -r requirements.txt && python -m dra"

  agent:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app:rw
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to your Supabase direct Postgres URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DRA_GRPC_TARGET: ${DRA_GRPC_TARGET:-dra:50051}
    depends_on:
      - dra
    entrypoint: ["sh", "-lc"]
    command: "pip install -r requirements.txt && python -m agent \"$${@}\""

  postgres:
    profiles: ["local-db"]
    image: postgres:16-alpine
    container_name: agentic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: machines_db
    ports:
      - "5432:5432"
    volumes:
      - agentic-postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d machines_db"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  agentic-postgres-data:
